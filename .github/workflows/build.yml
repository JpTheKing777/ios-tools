name: Build iOS App
on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Build archive
        run: |
          xcodebuild \
            -project IO-Tools/MyApp.xcodeproj \
            -scheme MyApp \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/MyApp.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export IPA
        run: |
          mkdir -p build/Payload
          mkdir -p build/output
          cp -r build/MyApp.xcarchive/Products/Applications/MyApp.app build/Payload/MyApp.app
          chmod -R 755 build/Payload/MyApp.app
          plutil -convert xml1 build/Payload/MyApp.app/Info.plist
          plutil -insert CFBundleExecutable -string MyApp build/Payload/MyApp.app/Info.plist
          cd build
          zip -r --symlinks output/MyApp.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: JaysTools-IOS
          path: build/output/MyApp.ipa
          if-no-files-found: error
