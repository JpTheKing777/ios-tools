name: Build iOS App
on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Build archive
        run: |
          xcodebuild \
            -project IO-Tools/MyApp.xcodeproj \
            -scheme MyApp \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/MyApp.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Show archive contents
        run: find build/MyApp.xcarchive -type f

      - name: Export IPA
        run: |
          mkdir -p build/output/Payload
          cp -r build/MyApp.xcarchive/Products/Applications/MyApp.app build/output/Payload/MyApp.app
          cd build/output
          zip -r MyApp.ipa Payload
          rm -rf Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: JaysTools-IOS
          path: build/output/MyApp.ipa
          if-no-files-found: error
